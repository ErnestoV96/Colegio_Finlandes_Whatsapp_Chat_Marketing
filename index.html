<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Chats</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #0F6E56;
    --green-xlight: #F0FBF7;
    --bg: #F7F8FA;
    --surface: #FFFFFF;
    --border: #E8EAF0;
    --text: #1A1D23;
    --text-2: #6B7280;
    --text-3: #9CA3AF;
    --pending: #F59E0B;
    --pending-bg: #FFFBEB;
    --resolved: #1D9E75;
    --resolved-bg: #E1F5EE;
    --inprocess: #3B82F6;
    --inprocess-bg: #EFF6FF;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* LOGIN */
  #loginScreen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center; z-index: 100;
    flex-direction: column; gap: 0;
  }
  .login-card {
    background: var(--surface); border-radius: 20px;
    border: 1px solid var(--border); padding: 40px 44px;
    width: 380px; text-align: center;
  }
  .login-logo { width: 52px; height: 52px; background: var(--green); border-radius: 14px;
    display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
  .login-logo svg { width: 28px; height: 28px; fill: white; }
  .login-card h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .login-card p { font-size: 13px; color: var(--text-2); margin-bottom: 28px; }
  .login-field { text-align: left; margin-bottom: 16px; }
  .login-field label { font-size: 12px; font-weight: 500; color: var(--text-2); display: block; margin-bottom: 6px; letter-spacing: 0.04em; text-transform: uppercase; }
  .login-field input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; transition: border 0.2s; background: var(--bg); }
  .login-field input:focus { border-color: var(--green); }
  .login-btn { width: 100%; padding: 12px; background: var(--green); color: white; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
  .login-btn:hover { background: var(--green-dark); }
  .login-error { font-size: 12px; color: #EF4444; margin-top: 10px; display: none; }

  /* TOPBAR */
  .topbar { height: 52px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0; }
  .topbar-logo { width: 30px; height: 30px; background: var(--green); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; }
  .topbar-logo svg { width: 16px; height: 16px; fill: white; }
  .topbar-title { font-size: 15px; font-weight: 600; }
  .topbar-sub { font-size: 12px; color: var(--text-3); font-family: 'DM Mono', monospace; }
  .topbar-spacer { flex: 1; }
  .refresh-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px;
    border: 1px solid var(--border); border-radius: var(--radius-sm); background: transparent;
    font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; color: var(--text-2); transition: all 0.2s; }
  .refresh-btn:hover { background: var(--bg); color: var(--text); }
  .refresh-btn svg { width: 14px; height: 14px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }

  /* MAIN LAYOUT */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: 300px; min-width: 300px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .sidebar-top { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); }
  .search-wrap { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; margin-bottom: 10px; }
  .search-wrap svg { width: 14px; height: 14px; color: var(--text-3); flex-shrink: 0; }
  .search-wrap input { border: none; background: transparent; outline: none; font-size: 13px; font-family: 'DM Sans', sans-serif; width: 100%; color: var(--text); }
  .filter-row { display: flex; gap: 6px; }
  .filter-btn { font-size: 12px; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; cursor: pointer; font-family: 'DM Sans', sans-serif; color: var(--text-2); transition: all 0.15s; }
  .filter-btn.active { background: var(--green); color: white; border-color: var(--green); }
  .chat-list { overflow-y: auto; flex: 1; }
  .chat-list::-webkit-scrollbar { width: 4px; }
  .chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .chat-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.1s; position: relative; }
  .chat-item:hover { background: var(--bg); }
  .chat-item.active { background: var(--green-xlight); border-left: 2px solid var(--green); }
  .avatar { width: 40px; height: 40px; min-width: 40px; border-radius: 50%; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--green-dark); }
  .ci-info { flex: 1; min-width: 0; }
  .ci-name { font-size: 13px; font-weight: 500; }
  .ci-prev { font-size: 12px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .ci-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .ci-time { font-size: 11px; color: var(--text-3); font-family: 'DM Mono', monospace; }

  /* STATUS BADGES */
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .badge-Pendiente { background: var(--pending-bg); color: var(--pending); }
  .badge-Resuelto { background: var(--resolved-bg); color: var(--resolved); }
  .badge-En.proceso { background: var(--inprocess-bg); color: var(--inprocess); }

  /* MAIN CHAT */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-hdr { padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .chat-hdr-info { flex: 1; }
  .chat-hdr-name { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .chat-hdr-phone { font-size: 12px; color: var(--text-3); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .hdr-actions { display: flex; gap: 8px; }
  .hdr-btn { width: 34px; height: 34px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-2); transition: all 0.15s; }
  .hdr-btn:hover { background: var(--bg); color: var(--text); }
  .hdr-btn svg { width: 16px; height: 16px; }

  /* MESSAGES */
  .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: var(--bg); }
  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .msg { max-width: 72%; }
  .msg-in { align-self: flex-start; }
  .msg-out { align-self: flex-end; }
  .bubble { padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.55; }
  .msg-in .bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg-out .bubble { background: var(--green); color: white; border-bottom-right-radius: 4px; }
  .msg-time { font-size: 11px; color: var(--text-3); margin-top: 4px; font-family: 'DM Mono', monospace; }
  .msg-out .msg-time { text-align: right; }
  .date-sep { text-align: center; font-size: 11px; color: var(--text-3); padding: 4px 0; }

  /* INPUT */
  .input-area { padding: 14px 20px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .msg-input { flex: 1; border: 1px solid var(--border); border-radius: 22px; padding: 10px 16px; font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; background: var(--bg); color: var(--text); transition: border 0.2s; }
  .msg-input:focus { border-color: var(--green); }
  .send-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--green); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background 0.2s; }
  .send-btn:hover { background: var(--green-dark); }
  .send-btn svg { width: 16px; height: 16px; fill: white; }
  .send-note { font-size: 11px; color: var(--text-3); text-align: center; padding: 6px 0 0; }

  /* EMPTY / LOADING */
  .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text-3); }
  .empty svg { width: 48px; height: 48px; opacity: 0.3; }
  .empty p { font-size: 14px; }
  .loading { text-align: center; padding: 40px; color: var(--text-3); font-size: 13px; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* STATUS SELECTOR */
  .status-select { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); font-family: 'DM Sans', sans-serif; cursor: pointer; outline: none; background: var(--surface); }

  /* MONDAY LINK */
  .monday-link { font-size: 11px; color: var(--green); text-decoration: none; display: flex; align-items: center; gap: 4px; }
  .monday-link:hover { text-decoration: underline; }

  .no-results { padding: 30px; text-align: center; color: var(--text-3); font-size: 13px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>

</div>

<!-- APP -->
<div id="app" style="display:none; flex-direction:column; height:100vh; overflow:hidden;">
  <div class="topbar">
    <div class="topbar-logo">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </div>
    <span class="topbar-title">WhatsApp Chats</span>
    <span class="topbar-sub">Monday.com</span>
    <div class="topbar-spacer"></div>
    <div class="status-dot"></div>
    <button class="refresh-btn" onclick="loadChats()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      Actualizar
    </button>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-top">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="Buscar contacto..." id="searchInput" oninput="filterChats(this.value)">
        </div>
        <div class="filter-row">
          <button class="filter-btn active" onclick="setFilter(this,'')">Todos</button>
          <button class="filter-btn" onclick="setFilter(this,'Pendiente')">Pendientes</button>
          <button class="filter-btn" onclick="setFilter(this,'Resuelto')">Resueltos</button>
        </div>

<script>
// ============================================================
// CONFIGURACIÓN — Rellena estos valores antes de subir a GitHub
// ============================================================
const CONFIG = {
  MONDAY_TOKEN: 'eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjExNjA3MTYwNiwiYWFpIjoxMSwidWlkIjoyMzA3Nzk4MywiaWFkIjoiMjAyMS0wNy0wNVQyMzoyMzo0Ni4wMDBaIiwicGVyIjoibWU6d3JpdGUiLCJhY3RpZCI6ODgxOTY4MSwicmduIjoidXNlMSJ9.-LPnI7K_AJjtbZDCBMIfXCJr2EjSrhoJyekZLHYDTiU',
  BOARD_ID: '18413426463',
  PASSWORD: 'Finlandes2021',

  // IDs exactos de columnas en Monday
  COL_TELEFONO: 'text_mm3ce2cj',
  COL_ULTIMO_MSG: 'long_text_mm3cvbfq',
  COL_DIRECCION: 'color_mm3cyxnb',
  COL_TODOS_MSG: 'long_text_mm3cs35w',
  COL_ESTADO: 'color_mm3cpmma',
  COL_FECHA: 'date_mm3cm5qk',
  COL_AGENTE: 'text_mm3cekpz',
};
// ============================================================

let allItems = [];
let activeFilter = '';
let activeId = null;
let searchVal = '';

// LOGIN
function doLogin() {
  const val = document.getElementById('pwInput').value;
  if (val === CONFIG.PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadChats();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

// MONDAY API
async function mondayQuery(query) {
  const res = await fetch('https://api.monday.com/v2', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': CONFIG.MONDAY_TOKEN,
      'API-Version': '2024-01'
    },
    body: JSON.stringify({ query })
  });
  return res.json();
}

async function loadChats() {
  document.getElementById('chatList').innerHTML = '<div class="loading"><div class="spinner"></div>Cargando chats...</div>';
  try {
    const q = `{ boards(ids: ${CONFIG.BOARD_ID}) { items_page(limit: 100) { items {
      id name
      column_values {
        id text
        ... on StatusValue { label }
        ... on TextValue { text }
        ... on LongTextValue { text }
        ... on DateValue { text }
        ... on PeopleValue { text }
      }
    }}}}`;
    const data = await mondayQuery(q);
    const items = data?.data?.boards?.[0]?.items_page?.items || [];
    allItems = items.map(item => {
      const cols = {};
      item.column_values.forEach(c => { cols[c.id] = c.text || c.label || ''; });
      return {
        id: item.id,
        name: item.name,
        telefono: getColValue(item, CONFIG.COL_TELEFONO),
        ultimoMsg: getColValue(item, CONFIG.COL_ULTIMO_MSG),
        direccion: getColValue(item, CONFIG.COL_DIRECCION),
        todosMsg: getColValue(item, CONFIG.COL_TODOS_MSG),
        estado: getColValue(item, CONFIG.COL_ESTADO) || 'Pendiente',
        fecha: getColValue(item, CONFIG.COL_FECHA),
        agente: getColValue(item, CONFIG.COL_AGENTE),
        raw: item
      };
    });
    renderList();
  } catch(e) {
    document.getElementById('chatList').innerHTML = '<div class="no-results">Error al cargar. Revisa tu API Token.</div>';
  }
}

function getColValue(item, colId) {
  const col = item.column_values.find(c => c.id === colId);
  return col ? (col.text || col.label || '') : '';
}

function renderList() {
  const list = document.getElementById('chatList');
  let items = allItems.filter(c => {
    if (activeFilter && c.estado !== activeFilter) return false;
    if (searchVal && !c.name.toLowerCase().includes(searchVal) && !c.telefono.includes(searchVal)) return false;
    return true;
  });
  if (!items.length) { list.innerHTML = '<div class="no-results">Sin resultados</div>'; return; }
  list.innerHTML = items.map(c => {
    const initials = c.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() || '??';
    const badgeClass = 'badge badge-' + c.estado.replace(' ','.');
    return `<div class="chat-item ${activeId===c.id?'active':''}" onclick="openChat('${c.id}')">
      <div class="avatar">${initials}</div>
      <div class="ci-info">
        <div class="ci-name">${c.name}</div>
        <div class="ci-prev">${c.ultimoMsg || c.telefono || '—'}</div>
      </div>
      <div class="ci-meta">
        <span class="ci-time">${formatDate(c.fecha)}</span>
        <span class="${badgeClass}">${c.estado}</span>
      </div>
    </div>`;
  }).join('');
}

function openChat(id) {
  activeId = id;
  renderList();
  const c = allItems.find(x => x.id === id);
  if (!c) return;
  const msgs = parseMessages(c.todosMsg);
  const initials = c.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() || '??';
  const badgeClass = 'badge badge-' + c.estado.replace(' ','.');
  const mondayUrl = `https://monday.com/boards/${CONFIG.BOARD_ID}/pulses/${c.id}`;

  document.getElementById('mainArea').innerHTML = `
    <div class="chat-hdr">
      <div class="avatar" style="width:38px;height:38px;min-width:38px;font-size:12px">${initials}</div>
      <div class="chat-hdr-info">
        <div class="chat-hdr-name">${c.name} <span class="${badgeClass}">${c.estado}</span></div>
        <div class="chat-hdr-phone">${c.telefono || 'Sin teléfono'} ${c.agente ? '· '+c.agente : ''}</div>
      </div>
      <div class="hdr-actions">
        <select class="status-select" onchange="updateStatus('${c.id}', this.value)">
          <option ${c.estado==='Pendiente'?'selected':''}>Pendiente</option>
          <option ${c.estado==='En proceso'?'selected':''}>En proceso</option>
          <option ${c.estado==='Resuelto'?'selected':''}>Resuelto</option>
        </select>
        <a href="${mondayUrl}" target="_blank" class="hdr-btn" title="Ver en Monday">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>
        </a>
      </div>
    </div>
    <div class="messages-area" id="msgArea">
      ${msgs.length ? msgs.map(m => `
        <div class="msg msg-${m.dir}">
          <div class="bubble">${m.text}</div>
          <div class="msg-time">${m.time}</div>
        </div>
      `).join('') : `
        <div class="empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
          <p>Sin mensajes registrados aún.<br>Make.com los irá añadiendo aquí.</p>
        </div>
      `}
    </div>
    <div class="input-area">
      <input class="msg-input" type="text" placeholder="Escribe una nota interna..." id="noteInput" onkeydown="if(event.key==='Enter')addNote('${c.id}')">
      <button class="send-btn" onclick="addNote('${c.id}')" title="Añadir nota">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="send-note">Las notas se guardan en Monday · Los mensajes reales se envían desde Make.com</div>
  `;
  document.getElementById('msgArea').scrollTop = 99999;
}

function parseMessages(raw) {
  if (!raw) return [];
  const lines = raw.split('\n').filter(l => l.trim());
  return lines.map(line => {
    const isOut = line.startsWith('[OUT]') || line.startsWith('>>');
    const clean = line.replace(/^\[IN\]|\[OUT\]|>>|<</,'').trim();
    const timeMatch = clean.match(/\[(\d{1,2}:\d{2}[^\]]*)\]/);
    const time = timeMatch ? timeMatch[1] : '';
    const text = clean.replace(/\[[^\]]*\]/,'').trim();
    return { dir: isOut ? 'out' : 'in', text: text || clean, time };
  }).filter(m => m.text);
}

async function updateStatus(itemId, newStatus) {
  const item = allItems.find(x => x.id === itemId);
  if (!item) return;
  const q = `mutation { change_column_value(board_id: ${CONFIG.BOARD_ID}, item_id: ${itemId}, column_id: "${CONFIG.COL_ESTADO}", value: "{\\"label\\":\\"${newStatus}\\"}") { id } }`;
  await mondayQuery(q);
  item.estado = newStatus;
  renderList();
}

async function addNote(itemId) {
  const input = document.getElementById('noteInput');
  const text = input.value.trim();
  if (!text) return;
  const item = allItems.find(x => x.id === itemId);
  const now = new Date();
  const time = now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes();
  const newLine = `[OUT][${time}] ${text}`;
  const updated = (item.todosMsg ? item.todosMsg + '\n' : '') + newLine;
  const escaped = updated.replace(/"/g,'\\"').replace(/\n/g,'\\n');
  const q = `mutation { change_column_value(board_id: ${CONFIG.BOARD_ID}, item_id: ${itemId}, column_id: "${CONFIG.COL_TODOS_MSG}", value: "{\\"text\\":\\"${escaped}\\"}") { id } }`;
  await mondayQuery(q);
  item.todosMsg = updated;
  item.ultimoMsg = text;
  input.value = '';
  openChat(itemId);
}

function setFilter(el, val) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  activeFilter = val;
  renderList();
}

function filterChats(val) {
  searchVal = val.toLowerCase();
  renderList();
}

function formatDate(str) {
  if (!str) return '';
  const d = new Date(str);
  if (isNaN(d)) return str;
  const today = new Date();
  const diff = Math.floor((today - d) / 86400000);
  if (diff === 0) return d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();
  if (diff === 1) return 'Ayer';
  if (diff < 7) return ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'][d.getDay()];
  return d.getDate()+'/'+(d.getMonth()+1);
}
